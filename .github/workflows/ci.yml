name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # ✅ Needed for matplotlib (headless environment)
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-0 libsm6 libxext6 libxrender-dev

    # ✅ Run unit tests
    - name: Run tests
      run: |
        pytest

    # ✅ Optional: Run core pipeline (strong for research reproducibility)
    - name: Run evaluation pipeline
      run: |
        python src/evaluate_defense.py
        python src/compare_results.py
        python src/plot_comparison.py
